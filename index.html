<script>
  const safeFetch = async (url, options = {}, timeout = 4500) => {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      const resp = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(timer);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return await resp.json();
    } catch (e) {
      clearTimeout(timer);
      throw e;
    }
  };

  new Vue({
    el: "#app",
    data: {
      nowSeconds: Math.floor(Date.now() / 1000),

      btcPrice: 0,
      ethPrice: 0,
      baselineBtcPrice: 0,

      usdtCnyPrice: 0,
      baselineUsdtCnyPrice: 0,
      usdtSourceText: "连接中...",

      usdcPegPrice: 1.0000,

      btcHistory: [],
      geoMean200: 0,
      fittedPrice: 0,

      alertLogs: [],
      newsList: [],

      fearGreedIndex: 50,
      fearGreedClassification: "中立",
      fgColor: "#facc15",
      fgSubtext: "本地模式",

      gaugeChartInstance: null,

      targetBlock: 1050000,
      startBlock: 840000,

      cryptoRealtimeStatus: "实时连接中..."
    },

    computed: {
      btcPriceColor() {
        if (!this.btcPrice || !this.baselineBtcPrice) return "";
        return this.btcPrice > this.baselineBtcPrice ? "price-up" : (this.btcPrice < this.baselineBtcPrice ? "price-down" : "");
      },
      ethPriceColor() { return ""; },

      btcPriceChangePercent() {
        if (!this.baselineBtcPrice) return "0.00";
        return (((this.btcPrice - this.baselineBtcPrice) / this.baselineBtcPrice) * 100).toFixed(2);
      },

      usdtColor() {
        if (!this.usdtCnyPrice || !this.baselineUsdtCnyPrice) return "";
        return this.usdtCnyPrice > this.baselineUsdtCnyPrice ? "price-up" : (this.usdtCnyPrice < this.baselineUsdtCnyPrice ? "price-down" : "");
      },

      usdcColor() {
        return this.usdcPegPrice < 0.999 ? "price-down" : (this.usdcPegPrice > 1.001 ? "price-up" : "");
      },

      liveAhr999() {
        if (!this.btcPrice || !this.geoMean200 || !this.fittedPrice) return "计算中...";
        const v = (this.btcPrice / this.geoMean200) * (this.btcPrice / this.fittedPrice);
        if (isNaN(v) || v <= 0 || v > 10) return "校准中...";
        return v.toFixed(4);
      },

      halvingDateFormatted() {
        return "2028-04-12";
      },

      halvingDays() {
        const targetDate = new Date("2028-04-12T00:00:00+08:00").getTime();
        const diff = targetDate - Date.now();
        return Math.max(0, Math.ceil(diff / 86400000));
      },

      calculatedBlock() {
        return this.targetBlock - this.halvingDays * 144;
      },

      halvingProgress() {
        const v = ((this.calculatedBlock - this.startBlock) / (this.targetBlock - this.startBlock)) * 100;
        return Math.min(Math.max(v, 0), 100).toFixed(2);
      }
    },

    mounted() {
      this.loadCache();
      this.initChart();
      this.fetchFearAndGreed();
      this.fetchCryptoPrices();
      this.fetchStablecoinPriceData();
      this.fetchCryptoNews();
      this.refreshAhrFromLocalSeries();

      setInterval(() => { this.nowSeconds = Math.floor(Date.now() / 1000); }, 1000);
      setInterval(() => this.fetchCryptoPrices(), 1500);
      setInterval(() => this.fetchStablecoinPriceData(), 10000);
      setInterval(() => this.fetchCryptoNews(), 30000);
      setInterval(() => this.fetchFearAndGreed(), 3600000);
      setInterval(() => this.refreshAhrFromLocalSeries(), 5000);

      let rt;
      window.addEventListener("resize", () => {
        clearTimeout(rt);
        rt = setTimeout(() => {
          if (this.gaugeChartInstance) this.gaugeChartInstance.resize();
          this.updateGaugeData(this.fearGreedIndex);
        }, 150);
      });
    },

    methods: {
      loadCache() {
        try {
          const b = parseFloat(localStorage.getItem("cache_btc_price") || "0");
          const e = parseFloat(localStorage.getItem("cache_eth_price") || "0");
          const u = parseFloat(localStorage.getItem("cache_usdt_cny") || "0");
          const hist = JSON.parse(localStorage.getItem("cache_btc_hist") || "[]");

          if (b > 0) this.btcPrice = b;
          if (e > 0) this.ethPrice = e;
          if (u > 0) this.usdtCnyPrice = u;
          if (Array.isArray(hist)) this.btcHistory = hist.filter(v => v > 0).slice(-200);
        } catch (_) {}
      },

      saveCache() {
        try {
          if (this.btcPrice > 0) localStorage.setItem("cache_btc_price", String(this.btcPrice));
          if (this.ethPrice > 0) localStorage.setItem("cache_eth_price", String(this.ethPrice));
          if (this.usdtCnyPrice > 0) localStorage.setItem("cache_usdt_cny", String(this.usdtCnyPrice));
          localStorage.setItem("cache_btc_hist", JSON.stringify(this.btcHistory.slice(-200)));
        } catch (_) {}
      },

      formatMsTime(ts) {
        const d = new Date(ts);
        const pad = n => String(n).padStart(2, "0");
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${String(d.getMilliseconds()).padStart(3, "0")}`;
      },

      median(arr) {
        if (!arr.length) return 0;
        const s = [...arr].sort((a, b) => a - b);
        const m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
      },

      updateBtcHistory(price) {
        if (!(price > 0)) return;
        this.btcHistory.push(price);
        if (this.btcHistory.length > 200) this.btcHistory = this.btcHistory.slice(-200);
      },

      refreshAhrFromLocalSeries() {
        if (this.btcHistory.length >= 10) {
          const sumLog = this.btcHistory.reduce((sum, p) => sum + Math.log(p), 0);
          this.geoMean200 = Math.exp(sumLog / this.btcHistory.length);
        } else if (this.btcPrice > 0) {
          this.geoMean200 = this.btcPrice * 0.85;
        }

        const daysSinceGenesis = (Date.now() - new Date("2009-01-03T00:00:00Z").getTime()) / 86400000;
        this.fittedPrice = Math.pow(10, 5.84 * Math.log10(daysSinceGenesis) - 17.01);
      },

      async fetchCryptoPrices() {
        const getFromOKX = async () => {
          const d = await safeFetch("https://www.okx.com/api/v5/market/tickers?instType=SPOT", {}, 3500);
          const list = Array.isArray(d?.data) ? d.data : [];
          const btc = parseFloat((list.find(i => i.instId === "BTC-USDT") || {}).last);
          const eth = parseFloat((list.find(i => i.instId === "ETH-USDT") || {}).last);
          const usdc = parseFloat((list.find(i => i.instId === "USDC-USDT") || {}).last);
          return { btc, eth, usdc, src: "OKX" };
        };

        const getFromHTX = async () => {
          const [b, e] = await Promise.all([
            safeFetch("https://api.huobi.pro/market/detail/merged?symbol=btcusdt", {}, 3000),
            safeFetch("https://api.huobi.pro/market/detail/merged?symbol=ethusdt", {}, 3000)
          ]);
          return {
            btc: parseFloat(b?.tick?.close),
            eth: parseFloat(e?.tick?.close),
            usdc: NaN,
            src: "HTX"
          };
        };

        const getFromMEXC = async () => {
          const [b, e, u] = await Promise.all([
            safeFetch("https://api.mexc.com/api/v3/ticker/price?symbol=BTCUSDT", {}, 3000),
            safeFetch("https://api.mexc.com/api/v3/ticker/price?symbol=ETHUSDT", {}, 3000),
            safeFetch("https://api.mexc.com/api/v3/ticker/price?symbol=USDCUSDT", {}, 3000)
          ]);
          return {
            btc: parseFloat(b?.price),
            eth: parseFloat(e?.price),
            usdc: parseFloat(u?.price),
            src: "MEXC"
          };
        };

        const sources = [getFromOKX, getFromHTX, getFromMEXC];
        let data = null;

        for (const fn of sources) {
          try {
            const r = await fn();
            if ((r.btc > 0) || (r.eth > 0)) {
              data = r;
              break;
            }
          } catch (_) {}
        }

        if (data) {
          if (data.btc > 0) {
            this.btcPrice = data.btc;
            if (!this.baselineBtcPrice) this.baselineBtcPrice = data.btc;
            this.updateBtcHistory(data.btc);
            this.checkBtcAlert();
          }
          if (data.eth > 0) this.ethPrice = data.eth;
          if (data.usdc > 0) this.usdcPegPrice = data.usdc;
          this.cryptoRealtimeStatus = `${data.src} 毫秒级更新时间 ${this.formatMsTime(Date.now())}`;
        } else {
          this.cryptoRealtimeStatus = "行情接口暂不可达，显示缓存数据";
        }

        this.refreshAhrFromLocalSeries();
        this.saveCache();
      },

      checkBtcAlert() {
        if (!this.baselineBtcPrice || !this.btcPrice) return;
        const ratio = (this.btcPrice - this.baselineBtcPrice) / this.baselineBtcPrice;
        if (ratio >= 0.02) {
          this.triggerAlert("up", `BTC 大涨！$${this.btcPrice.toFixed(2)}，较基准上涨 ${(ratio * 100).toFixed(2)}%`);
        } else if (ratio <= -0.02) {
          this.triggerAlert("down", `BTC 大跌！$${this.btcPrice.toFixed(2)}，较基准下跌 ${(Math.abs(ratio) * 100).toFixed(2)}%`);
        }
      },

      triggerAlert(type, message) {
        this.alertLogs.unshift({ time: new Date().toLocaleTimeString(), type, msg: message });
        if (this.alertLogs.length > 30) this.alertLogs.pop();
        this.baselineBtcPrice = this.btcPrice;
      },

      async fetchBinanceC2CUsdtPrice() {
        const payload = {
          page: 1,
          rows: 20,
          payTypes: [],
          asset: "USDT",
          fiat: "CNY",
          tradeType: "BUY",
          publisherType: null,
          merchantCheck: false,
          countries: [],
          proMerchantAds: false,
          shieldMerchantAds: false,
          filterType: "all",
          periods: [],
          additionalKycVerifyFilter: 0
        };

        const urls = [
          "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search",
          "https://www.binance.com/bapi/c2c/v2/friendly/c2c/adv/search"
        ];

        for (const url of urls) {
          try {
            const res = await safeFetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Accept": "application/json" },
              body: JSON.stringify(payload)
            }, 6000);

            const list = Array.isArray(res?.data) ? res.data : [];
            const prices = list
              .map(x => parseFloat(x?.adv?.price))
              .filter(v => !isNaN(v) && v > 0)
              .slice(0, 10);

            if (prices.length) return this.median(prices);
          } catch (_) {}
        }
        return 0;
      },

      async fetchUsdCny() {
        const apis = [
          { url: "https://open.er-api.com/v6/latest/USD", map: d => parseFloat(d?.rates?.CNY) },
          { url: "https://api.exchangerate.host/latest?base=USD&symbols=CNY", map: d => parseFloat(d?.rates?.CNY) }
        ];
        for (const a of apis) {
          try {
            const d = await safeFetch(a.url, {}, 3200);
            const v = a.map(d);
            if (v > 6 && v < 9) return v;
          } catch (_) {}
        }
        return 7.2;
      },

      async fetchUsdtUsd() {
        const apis = [
          { url: "https://api.kraken.com/0/public/Ticker?pair=USDTUSD", map: d => parseFloat(d?.result?.USDTZUSD?.c?.[0]) },
          { url: "https://api.gateio.ws/api/v4/spot/tickers?currency_pair=USDT_USDC", map: d => parseFloat(Array.isArray(d) ? d[0]?.last : NaN) }
        ];
        for (const a of apis) {
          try {
            const d = await safeFetch(a.url, {}, 3200);
            const v = a.map(d);
            if (v > 0.95 && v < 1.05) return v;
          } catch (_) {}
        }
        return 1.0;
      },

      async fetchStablecoinPriceData() {
        const c2c = await this.fetchBinanceC2CUsdtPrice();
        if (c2c > 0) {
          this.usdtCnyPrice = c2c;
          if (!this.baselineUsdtCnyPrice) this.baselineUsdtCnyPrice = c2c;
          this.usdtSourceText = "币安 C2C 实时中位价";
        } else {
          const usdCny = await this.fetchUsdCny();
          const usdtUsd = await this.fetchUsdtUsd();
          const synthetic = usdCny * usdtUsd * 1.002;
          if (synthetic > 6 && synthetic < 9) {
            this.usdtCnyPrice = synthetic;
            if (!this.baselineUsdtCnyPrice) this.baselineUsdtCnyPrice = synthetic;
            this.usdtSourceText = "免VPN合成价";
          } else {
            this.usdtSourceText = "USDT 接口不可达";
          }
        }
        this.saveCache();
      },

      async fetchCryptoNews() {
        const localNews = [
          {
            source: "System",
            title: `BTC $${this.btcPrice ? this.btcPrice.toFixed(2) : "--"} | ETH $${this.ethPrice ? this.ethPrice.toFixed(2) : "--"} | USDT ¥${this.usdtCnyPrice ? this.usdtCnyPrice.toFixed(2) : "--"}`,
            timestamp: this.nowSeconds
          },
          {
            source: "Market",
            title: this.cryptoRealtimeStatus || "实时价格轮询中...",
            timestamp: this.nowSeconds - 60
          }
        ];

        try {
          const data = await safeFetch("https://min-api.cryptocompare.com/data/v2/news/?lang=ZH", {}, 3200);
          if (data?.Data?.length) {
            this.newsList = data.Data.slice(0, 4).map(item => ({
              source: item?.source_info?.name || "CryptoNews",
              title: item?.title || "",
              timestamp: item?.published_on || this.nowSeconds
            })).concat(localNews);
            return;
          }
        } catch (_) {}

        this.newsList = localNews;
      },

      getNewsColor(ts) {
        const mins = (this.nowSeconds - ts) / 60;
        if (mins <= 10) return "#ef4444";
        if (mins <= 30) return "#38bdf8";
        return "#cbd5e1";
      },

      getNewsTimeText(ts) {
        const mins = Math.floor((this.nowSeconds - ts) / 60);
        if (mins < 1 || isNaN(mins)) return "刚刚";
        if (mins < 60) return mins + "分钟前";
        return Math.floor(mins / 60) + "小时前";
      },

      isShutdown(shutdownPrice) {
        return this.btcPrice > 0 && this.btcPrice < shutdownPrice;
      },

      initChart() {
        if (typeof echarts === "undefined") return;
        const dom = document.getElementById("gaugeChart");
        if (!dom) return;
        if (!this.gaugeChartInstance) this.gaugeChartInstance = echarts.init(dom);
        this.updateGaugeData(this.fearGreedIndex);
      },

      updateGaugeData(val) {
        if (!this.gaugeChartInstance) return;
        const isMobile = window.innerWidth <= 1024;
        this.gaugeChartInstance.setOption({
          animationDuration: 260,
          series: [{
            type: "gauge",
            startAngle: 180,
            endAngle: 0,
            min: 0,
            max: 100,
            center: ["50%", isMobile ? "74%" : "76%"],
            radius: isMobile ? "96%" : "104%",
            splitNumber: 4,
            axisLine: {
              lineStyle: {
                width: isMobile ? 8 : 12,
                color: [[0.25, "#ef4444"], [0.45, "#fb923c"], [0.55, "#facc15"], [0.75, "#4ade80"], [1, "#22c55e"]]
              }
            },
            axisTick: { show: false },
            splitLine: { show: false },
            axisLabel: { show: false },
            pointer: {
              length: "56%",
              width: isMobile ? 4 : 7,
              itemStyle: { color: "#e2e8f0" }
            },
            anchor: {
              show: true,
              size: isMobile ? 7 : 9,
              itemStyle: { color: "#e2e8f0" }
            },
            detail: { show: false },
            title: { show: false },
            data: [{ value: val }]
          }]
        });
      },

      async fetchFearAndGreed() {
        try {
          const data = await safeFetch("https://api.alternative.me/fng/", {}, 3000);
          if (data?.data?.length) {
            const val = parseInt(data.data[0].value, 10);
            this.fearGreedIndex = val;

            if (val <= 25) {
              this.fearGreedClassification = "极度恐惧";
              this.fgSubtext = "市场恐惧，分批建仓";
              this.fgColor = "#ef4444";
            } else if (val <= 45) {
              this.fearGreedClassification = "恐惧";
              this.fgSubtext = "情绪偏向悲观";
              this.fgColor = "#fb923c";
            } else if (val <= 55) {
              this.fearGreedClassification = "中立";
              this.fgSubtext = "情绪平稳，观望为主";
              this.fgColor = "#facc15";
            } else if (val <= 75) {
              this.fearGreedClassification = "贪婪";
              this.fgSubtext = "市场情绪乐观";
              this.fgColor = "#4ade80";
            } else {
              this.fearGreedClassification = "极度贪婪";
              this.fgSubtext = "极度贪婪，注意回调风险";
              this.fgColor = "#22c55e";
            }

            this.updateGaugeData(val);
          }
        } catch (_) {
          // no-op
        }
      }
    }
  });
</script>
