<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto AI - 稳定版</title>

<!-- ✅ 稳定 CDN -->
<script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/axios@0.27.2/dist/axios.min.js"></script>
<script src="https://unpkg.com/echarts@5.5.0/dist/echarts.min.js"></script>

<style>
body { background:#0f172a; color:#e2e8f0; font-family:sans-serif; text-align:center; }
.card { background:#1e293b; padding:20px; margin:20px auto; max-width:600px; border-radius:10px; }
.price-up{color:#2ecc71;}
.price-down{color:#e74c3c;}
</style>
</head>

<body>
<div id="app">

<h1>🚀 Crypto AI 稳定版</h1>

<div class="card">
<h2>BTC 实时价格</h2>
<div :class="priceColor" style="font-size:40px">
{{ displayPrice }}
</div>
<p>波动：{{ priceChangePercent }}%</p>
</div>

<div class="card">
<h2>恐惧贪婪指数</h2>
<div id="chart" style="height:200px;"></div>
<p>{{ fearGreedClassification }}</p>
</div>

</div>

<script>
new Vue({
el:"#app",
data:{
currentPrice:0,
lastValidPrice:0,
baselinePrice:0,
fearGreedIndex:50,
fearGreedClassification:"加载中",
chart:null
},

computed:{
displayPrice(){
if(!this.currentPrice) return "加载中...";
return "$ "+this.currentPrice.toFixed(2);
},
priceChangePercent(){
if(!this.baselinePrice) return "0.00";
return (((this.currentPrice-this.baselinePrice)/this.baselinePrice)*100).toFixed(2);
},
priceColor(){
if(!this.baselinePrice) return "";
return this.currentPrice>this.baselinePrice?"price-up":"price-down";
}
},

mounted(){
this.$nextTick(()=>{
this.initChart();
});

this.fetchPrice();
this.fetchFG();

setInterval(this.fetchPrice,3000);
setInterval(this.fetchFG,60000);
},

methods:{

initChart(){
const dom=document.getElementById("chart");
this.chart=echarts.init(dom);
this.updateChart();
},

updateChart(){
if(!this.chart) return;
this.chart.setOption({
series:[{
type:'gauge',
min:0,
max:100,
data:[{value:this.fearGreedIndex}]
}]
});
},

async fetchPrice(){
try{
let res=await axios.get("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",{timeout:2000});
let price=parseFloat(res.data.price);

if(price){
this.currentPrice=price;
this.lastValidPrice=price;

if(!this.baselinePrice){
this.baselinePrice=price;
}
}
}catch(e){
if(this.lastValidPrice){
this.currentPrice=this.lastValidPrice;
}
}
},

async fetchFG(){
try{
let res=await axios.get("https://api.alternative.me/fng/");
let val=parseInt(res.data.data[0].value);

this.fearGreedIndex=val;

if(val<25) this.fearGreedClassification="极度恐惧";
else if(val<50) this.fearGreedClassification="恐惧";
else if(val<75) this.fearGreedClassification="贪婪";
else this.fearGreedClassification="极度贪婪";

this.updateChart();

}catch(e){}
}

}
});
</script>

</body>
</html>
