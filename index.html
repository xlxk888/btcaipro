<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto AI</title>

<script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/axios@0.27.2/dist/axios.min.js"></script>

<style>
[v-cloak] { display: none !important; }

body {
    font-family: Arial;
    background: #10172a;
    color: #e2e8f0;
    margin: 0;
    padding: 15px;
}

h1 {
    text-align: center;
    color: #f39c12;
}

/* 卡片 */
.card {
    background: #1a263c;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* BTC价格 */
.btc-price {
    font-weight: bold;
    font-size: 3.2rem;
    word-break: break-all;
}

/* 手机适配 */
@media (max-width:768px) {
    .btc-price {
        font-size: 2rem !important;
        line-height: 1.2;
    }
}

/* 防止溢出 */
.big-number {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* logo */
.crypto-logo {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
}

/* 涨跌颜色 */
.price-up { color:#2ecc71; }
.price-down { color:#e74c3c; }

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
</style>
</head>

<body>

<div id="app" v-cloak>

<h1>🚀 Crypto AI</h1>

<!-- BTC -->
<div class="card">
    <div class="row">
        <div style="display:flex;align-items:center;gap:8px;">
            <img class="crypto-logo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png?v=029">
            <strong>BTC</strong>
        </div>
    </div>

    <div class="big-number btc-price" :class="priceColor">
        {{ currentPrice === 0 ? '连接中...' : '$ ' + formatPrice(currentPrice) }}
    </div>

    <div>
        基准价: ${{ formatPrice(baselinePrice) }} |
        波动: <span :class="priceColor">{{ priceChangePercent }}%</span>
    </div>
</div>

<!-- 稳定币 -->
<div class="card">

    <!-- USDT -->
    <div class="row" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <img class="crypto-logo" src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=029">
            <span>USDT / CNY</span>
        </div>
        <div>¥ {{ usdtCnyPrice }}</div>
    </div>

    <!-- USDC -->
    <div class="row">
        <div style="display:flex;align-items:center;gap:8px;">
            <img class="crypto-logo" src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png?v=029">
            <span>USDC / USDT</span>
        </div>
        <div :class="usdcColor">$ {{ usdcPegPrice.toFixed(4) }}</div>
    </div>

</div>

</div>

<script>
new Vue({
    el:"#app",

    data:{
        currentPrice:0,
        baselinePrice:0,
        usdtCnyPrice:"6.94",
        usdcPegPrice:1.0000
    },

    computed:{
        priceChangePercent(){
            if(this.baselinePrice===0) return 0;
            return (((this.currentPrice-this.baselinePrice)/this.baselinePrice)*100).toFixed(2);
        },
        priceColor(){
            if(this.currentPrice>this.baselinePrice) return 'price-up';
            if(this.currentPrice<this.baselinePrice) return 'price-down';
            return '';
        },
        usdcColor(){
            if(this.usdcPegPrice<0.999) return 'price-down';
            if(this.usdcPegPrice>1.001) return 'price-up';
            return '';
        }
    },

    mounted(){
        this.fetchPrice();
        setInterval(this.fetchPrice,5000);
    },

    methods:{

        // 价格格式（关键优化）
        formatPrice(price){
            if(!price) return '0.00';

            if(window.innerWidth<=768){
                return price.toLocaleString(undefined,{
                    maximumFractionDigits:2
                });
            }

            return price.toLocaleString(undefined,{
                maximumFractionDigits:4
            });
        },

        // 多接口容错
        async fetchPrice(){

            const apis=[
                'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT',
                'https://api.mexc.com/api/v3/ticker/price?symbol=BTCUSDT',
                'https://data-api.binance.vision/api/v3/ticker/price?symbol=BTCUSDT'
            ];

            for(let url of apis){
                try{
                    let res=await axios.get(url,{timeout:3000});

                    if(res.data && res.data.price){
                        let price=parseFloat(res.data.price);

                        this.currentPrice=price;

                        if(this.baselinePrice===0){
                            this.baselinePrice=price;
                        }

                        return;
                    }

                }catch(e){}
            }
        }
    }
});
</script>

</body>
</html>
