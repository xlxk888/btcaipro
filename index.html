<script>
    const safeFetchJson = async (url, options = {}, timeout = 5000) => {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);

        try {
            const response = await fetch(url, {
                ...options,
                signal: controller.signal
            });
            clearTimeout(id);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            return await response.json();
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    };

    new Vue({
        el: '#app',
        data: {
            nowSeconds: Math.floor(Date.now() / 1000),
            currentPrice: 0,
            baselinePrice: 0,
            usdcPegPrice: 1.0000,
            usdtCnyPrice: '0.00',
            baselineUsdtCnyPrice: 0,
            geoMean200: 0,
            fittedPrice: 0,
            alertLogs: [],
            newsList: [],
            fearGreedIndex: 50,
            fearGreedClassification: '拉取中...',
            fgColor: '#f1c40f',
            fgSubtext: '正在连线...',
            gaugeChartInstance: null,
            targetBlock: 1050000,
            startBlock: 840000,
            isFetchingPrice: false
        },
        computed: {
            liveAhr999() {
                if (this.currentPrice === 0 || this.geoMean200 === 0 || this.fittedPrice === 0) return '计算中...';
                let val = ((this.currentPrice / this.geoMean200) * (this.currentPrice / this.fittedPrice));
                if (isNaN(val) || val > 10 || val < 0.05) return '校准中...';
                return val.toFixed(4);
            },
            usdcColor() {
                return this.usdcPegPrice < 0.999 ? 'price-down' : (this.usdcPegPrice > 1.001 ? 'price-up' : '');
            },
            usdtColor() {
                const current = parseFloat(this.usdtCnyPrice);
                return current > this.baselineUsdtCnyPrice ? 'price-up' : (current < this.baselineUsdtCnyPrice ? 'price-down' : '');
            },
            priceChangePercent() {
                return this.baselinePrice === 0 ? 0 : (((this.currentPrice - this.baselinePrice) / this.baselinePrice) * 100).toFixed(2);
            },
            priceColor() {
                return this.currentPrice > this.baselinePrice ? 'price-up' : (this.currentPrice < this.baselinePrice ? 'price-down' : '');
            },
            halvingDateFormatted() { return '2028-04-12'; },
            halvingDays() {
                const targetDate = new Date("2028-04-12T00:00:00+08:00").getTime();
                const now = Date.now();
                return Math.max(0, Math.floor((targetDate - now) / (1000 * 60 * 60 * 24)));
            },
            calculatedBlock() { return this.targetBlock - (this.halvingDays * 144); },
            halvingProgress() {
                const current = this.calculatedBlock;
                return Math.min(Math.max(((current - this.startBlock) / (this.targetBlock - this.startBlock)) * 100, 0), 100).toFixed(2);
            }
        },
        mounted() {
            this.initChart();
            this.fetchFearAndGreed();

            this.fetchPriceData();
            setInterval(() => this.fetchPriceData(), 3500);

            this.fetchStablecoinPriceData();
            setInterval(() => this.fetchStablecoinPriceData(), 10000);

            this.fetchCryptoNews();
            setInterval(() => this.fetchCryptoNews(), 30000);

            setTimeout(() => this.fetchAhr999Data(), 1500);

            setInterval(() => this.fetchFearAndGreed(), 3600000);
            setInterval(() => this.fetchAhr999Data(), 14400000);
            setInterval(() => { this.nowSeconds = Math.floor(Date.now() / 1000); }, 1000);

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (this.gaugeChartInstance) this.gaugeChartInstance.resize();
                    this.updateGaugeData(this.fearGreedIndex);
                }, 200);
            });
        },
        methods: {
            isShutdown(shutdownPrice) {
                return this.currentPrice > 0 && this.currentPrice < shutdownPrice;
            },

            median(values) {
                if (!values.length) return 0;
                const sorted = [...values].sort((a, b) => a - b);
                const mid = Math.floor(sorted.length / 2);
                return sorted.length % 2 === 0
                    ? (sorted[mid - 1] + sorted[mid]) / 2
                    : sorted[mid];
            },

            async fetchPriceData() {
                if (this.isFetchingPrice) return;
                this.isFetchingPrice = true;
                let priceFound = false;

                if (!priceFound) {
                    try {
                        const res = await safeFetchJson('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT', {}, 3000);
                        if (res && res.price) {
                            this.updatePriceLogic(parseFloat(res.price));
                            priceFound = true;
                        }
                    } catch (e) {}
                }

                if (!priceFound) {
                    try {
                        const res = await safeFetchJson('https://api.mexc.com/api/v3/ticker/price?symbol=BTCUSDT', {}, 3000);
                        if (res && res.price) {
                            this.updatePriceLogic(parseFloat(res.price));
                            priceFound = true;
                        }
                    } catch (e) {}
                }

                if (!priceFound && this.currentPrice === 0) {
                    this.updatePriceLogic(68500.00);
                }

                this.isFetchingPrice = false;
            },

            async fetchBinanceC2CUsdtPrice() {
                const payload = {
                    page: 1,
                    rows: 10,
                    payTypes: [],
                    asset: 'USDT',
                    tradeType: 'BUY', // 如果你要“卖出USDT换CNY”，改成 SELL
                    fiat: 'CNY',
                    publisherType: null,
                    merchantCheck: true,
                    countries: [],
                    proMerchantAds: false,
                    shieldMerchantAds: false,
                    filterType: 'all',
                    periods: [],
                    additionalKycVerifyFilter: 0
                };

                const res = await safeFetchJson(
                    'https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    },
                    5000
                );

                const rows = Array.isArray(res && res.data) ? res.data : [];
                if (!rows.length) throw new Error('No C2C ads');

                const filteredPrices = rows
                    .filter(item => {
                        const price = parseFloat(item?.adv?.price);
                        const qty = parseFloat(item?.adv?.surplusAmount || item?.adv?.tradableQuantity || '0');
                        return !isNaN(price) && price > 0 && qty > 50;
                    })
                    .slice(0, 5)
                    .map(item => parseFloat(item.adv.price));

                if (!filteredPrices.length) throw new Error('No valid C2C prices');

                return this.median(filteredPrices);
            },

            async fetchStablecoinPriceData() {
                try {
                    const c2cPrice = await this.fetchBinanceC2CUsdtPrice();
                    if (this.baselineUsdtCnyPrice === 0) {
                        this.baselineUsdtCnyPrice = c2cPrice;
                    }
                    this.usdtCnyPrice = c2cPrice.toFixed(2);
                } catch (e) {
                    if (this.usdtCnyPrice === '0.00') {
                        this.usdtCnyPrice = '7.30';
                        if (this.baselineUsdtCnyPrice === 0) {
                            this.baselineUsdtCnyPrice = 7.30;
                        }
                    }
                }

                let usdcFound = false;

                if (!usdcFound) {
                    try {
                        const res = await safeFetchJson('https://api.binance.com/api/v3/ticker/price?symbol=USDCUSDT', {}, 2000);
                        if (res && res.price) {
                            this.usdcPegPrice = parseFloat(res.price);
                            usdcFound = true;
                        }
                    } catch (e) {}
                }

                if (!usdcFound) {
                    try {
                        const res = await safeFetchJson('https://api.mexc.com/api/v3/ticker/price?symbol=USDCUSDT', {}, 2000);
                        if (res && res.price) {
                            this.usdcPegPrice = parseFloat(res.price);
                            usdcFound = true;
                        }
                    } catch (e) {}
                }

                if (!usdcFound && this.usdcPegPrice === 1.0000) {
                    this.usdcPegPrice = 1.0000;
                }
            },

            async fetchCryptoNews() {
                let fetched = false;

                if (!fetched) {
                    try {
                        const data = await safeFetchJson('https://min-api.cryptocompare.com/data/v2/news/?lang=ZH', {}, 3500);
                        if (data && data.Data && data.Data.length > 0) {
                            this.newsList = data.Data.slice(0, 8).map(item => ({
                                source: item.source_info.name || 'CryptoNews',
                                title: item.title,
                                timestamp: item.published_on || this.nowSeconds
                            }));
                            fetched = true;
                        }
                    } catch (e) {}
                }

                if (!fetched) {
                    try {
                        const data = await safeFetchJson('https://min-api.cryptocompare.com/data/v2/news/?lang=EN', {}, 3500);
                        if (data && data.Data && data.Data.length > 0) {
                            this.newsList = data.Data.slice(0, 8).map(item => ({
                                source: item.source_info.name || 'CryptoNews',
                                title: item.title,
                                timestamp: item.published_on || this.nowSeconds
                            }));
                            fetched = true;
                        }
                    } catch (e) {}
                }

                if (!fetched && this.newsList.length === 0) {
                    this.newsList = [
                        { source: 'System', title: '🔴 国际资讯节点被拦截，当前展示离线系统提示。如需获取全球资讯，请确保设备全程开启 VPN 代理环境...', timestamp: this.nowSeconds },
                        { source: 'Market', title: '市场震荡，AHR999 指数提供定投参考', timestamp: this.nowSeconds - 1800 }
                    ];
                }
            },

            async fetchAhr999Data() {
                const daysSinceGenesis = (Date.now() - new Date('2009-01-03T00:00:00Z').getTime()) / 86400000;
                this.fittedPrice = Math.pow(10, 5.84 * Math.log10(daysSinceGenesis) - 17.01);

                try {
                    const data = await safeFetchJson('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=30', {}, 3500);
                    if (Array.isArray(data) && data.length > 0) {
                        const prices = data.map(k => parseFloat(k[4])).filter(p => !isNaN(p) && p > 0);
                        if (prices.length > 0) {
                            const sumLog = prices.reduce((sum, p) => sum + Math.log(p), 0);
                            const shortTermGeoMean = Math.exp(sumLog / prices.length);
                            this.geoMean200 = shortTermGeoMean * 0.92;
                            return;
                        }
                    }
                } catch (e) {}

                if (this.currentPrice > 0) {
                    this.geoMean200 = this.currentPrice * 0.85;
                } else if (this.geoMean200 === 0) {
                    this.geoMean200 = 60000;
                }
            },

            getNewsColor(timestamp) {
                const diffMins = (this.nowSeconds - timestamp) / 60;
                if (diffMins <= 10) return '#e74c3c';
                if (diffMins <= 30) return '#3498db';
                return '#cbd5e1';
            },

            getNewsTimeText(timestamp) {
                const diffMins = Math.floor((this.nowSeconds - timestamp) / 60);
                if (diffMins < 1 || isNaN(diffMins)) return '刚刚';
                if (diffMins < 60) return diffMins + '分钟前';
                return Math.floor(diffMins / 60) + '小时前';
            },

            initChart() {
                if (typeof echarts === 'undefined') return;
                const chartDom = document.getElementById('gaugeChart');
                if (!this.gaugeChartInstance) this.gaugeChartInstance = echarts.init(chartDom);
                this.updateGaugeData(this.fearGreedIndex);
            },

            updateGaugeData(val) {
                if (!this.gaugeChartInstance) return;
                const isMobile = window.innerWidth <= 1024;
                this.gaugeChartInstance.setOption({
                    series: [{
                        type: 'gauge',
                        startAngle: 180,
                        endAngle: 0,
                        min: 0,
                        max: 100,
                        splitNumber: 4,
                        splitLine: { show: false },
                        center: ['50%', isMobile ? '65%' : '80%'],
                        radius: '110%',
                        axisLine: {
                            lineStyle: {
                                width: isMobile ? 8 : 10,
                                color: [[0.25, '#e74c3c'], [0.45, '#e67e22'], [0.55, '#f1c40f'], [0.75, '#2ecc71'], [1, '#27ae60']]
                            }
                        },
                        pointer: { length: '55%', width: 5, itemStyle: { color: '#e2e8f0' } },
                        axisTick: { show: false },
                        axisLabel: { show: false },
                        detail: { fontSize: 18, offsetCenter: [0, '40%'], color: '#e2e8f0', formatter: '{value}' },
                        data: [{ value: val }]
                    }]
                });
            },

            async fetchFearAndGreed() {
                try {
                    const data = await safeFetchJson('https://api.alternative.me/fng/');
                    if (data && data.data && data.data.length > 0) {
                        const val = parseInt(data.data[0].value);
                        this.fearGreedIndex = val;
                        if (val <= 25) { this.fearGreedClassification = '极度恐惧'; this.fgSubtext = '市场恐惧，分批建仓'; this.fgColor = '#e74c3c'; }
                        else if (val <= 45) { this.fearGreedClassification = '恐惧'; this.fgSubtext = '情绪偏向悲观'; this.fgColor = '#e67e22'; }
                        else if (val <= 55) { this.fearGreedClassification = '中立'; this.fgSubtext = '情绪平稳，观望为主'; this.fgColor = '#f1c40f'; }
                        else if (val <= 75) { this.fearGreedClassification = '贪婪'; this.fgSubtext = '市场情绪乐观'; this.fgColor = '#2ecc71'; }
                        else { this.fearGreedClassification = '极度贪婪'; this.fgSubtext = '极度贪婪，注意回调风险'; this.fgColor = '#27ae60'; }
                        this.updateGaugeData(val);
                    }
                } catch (e) {}
            },

            updatePriceLogic(newPrice) {
                if (newPrice > 0 && Math.abs(this.currentPrice - newPrice) > 0.1) {
                    this.currentPrice = newPrice;
                    if (this.baselinePrice === 0) {
                        this.baselinePrice = this.currentPrice;
                        if (this.geoMean200 === 0) this.fetchAhr999Data();
                    }
                    this.checkPriceAlert();
                }
            },

            checkPriceAlert() {
                if (this.baselinePrice === 0) return;
                const changeRatio = (this.currentPrice - this.baselinePrice) / this.baselinePrice;
                if (changeRatio >= 0.02) {
                    this.triggerAlert('up', `大涨！当前 $${this.currentPrice.toFixed(2)}，较基准上涨 ${(changeRatio * 100).toFixed(2)}%`);
                } else if (changeRatio <= -0.02) {
                    this.triggerAlert('down', `大跌！当前 $${this.currentPrice.toFixed(2)}，较基准下跌 ${(Math.abs(changeRatio) * 100).toFixed(2)}%`);
                }
            },

            triggerAlert(type, message) {
                const timeStr = new Date().toLocaleTimeString();
                this.alertLogs.unshift({ time: timeStr, type: type, msg: message });
                if (this.alertLogs.length > 30) this.alertLogs.pop();
                this.baselinePrice = this.currentPrice;
            }
        }
    });
</script>
