<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto AI</title>

<script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/axios@0.27.2/dist/axios.min.js"></script>
<script src="https://unpkg.com/echarts@5.5.0/dist/echarts.min.js"></script>

<style>
[v-cloak] { display: none !important; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva;
    background-color: #10172a;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #f39c12;
}

.grid-container {
    display: grid;
    gap: 20px;
    grid-template-columns: repeat(6, 1fr);
    max-width: 1400px;
    margin: 0 auto;
}

.span-2 { grid-column: span 2; }
.span-3 { grid-column: span 3; }
.span-4 { grid-column: span 4; }

.card {
    background-color: #1a263c;
    padding: 20px;
    border-radius: 12px;
}

.price-up { color: #2ecc71; }
.price-down { color: #e74c3c; }

.big-number {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* 🔥 BTC修复 */
.btc-price {
    font-size: 3.2rem;
    font-weight: bold;
    word-break: break-all;
}

/* 🔥 手机适配 */
@media (max-width: 1024px) {
    .grid-container {
        display: flex;
        flex-direction: column;
    }
    .btc-price {
        font-size: 2rem !important;
        line-height: 1.2;
    }
}

/* 🔥 logo修复 */
.crypto-logo {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
}
</style>
</head>

<body>

<div id="app" v-cloak>

<h1>🚀 Crypto AI</h1>

<div class="grid-container">

<!-- BTC -->
<div class="card span-4">
<h2>BTC 实时价格</h2>

<div style="display:flex;justify-content:space-between;flex-wrap:wrap;">

<div>
<div style="display:flex;align-items:center;gap:8px;">
<img class="crypto-logo" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png?v=029">
<strong>BTC</strong>
</div>

<div class="big-number btc-price" :class="priceColor">
{{ currentPrice === 0 ? '连接中...' : '$ ' + formatPrice(currentPrice) }}
</div>

<p>
基准: $ {{ formatPrice(baselinePrice) }} |
波动: <span :class="priceColor">{{ priceChangePercent }}%</span>
</p>
</div>

</div>
</div>

<!-- 稳定币 -->
<div class="card span-2">
<h2>稳定币</h2>

<div style="display:flex;justify-content:space-between;">
<div style="display:flex;align-items:center;gap:6px;">
<img class="crypto-logo" src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=029">
USDT / CNY
</div>
<div>¥ {{ usdtCnyPrice }}</div>
</div>

<div style="display:flex;justify-content:space-between;margin-top:10px;">
<div style="display:flex;align-items:center;gap:6px;">
<img class="crypto-logo" src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png?v=029">
USDC / USDT
</div>
<div :class="usdcColor">$ {{ usdcPegPrice.toFixed(4) }}</div>
</div>

</div>

</div>
</div>

<script>
new Vue({
el:"#app",

data:{
currentPrice:0,
baselinePrice:0,
usdtCnyPrice:"6.94",
usdcPegPrice:1.0000
},

computed:{
priceChangePercent(){
if(this.baselinePrice===0) return 0;
return (((this.currentPrice-this.baselinePrice)/this.baselinePrice)*100).toFixed(2);
},
priceColor(){
if(this.currentPrice>this.baselinePrice) return 'price-up';
if(this.currentPrice<this.baselinePrice) return 'price-down';
return '';
},
usdcColor(){
if(this.usdcPegPrice<0.999) return 'price-down';
if(this.usdcPegPrice>1.001) return 'price-up';
return '';
}
},

mounted(){
this.fetchPrice();
setInterval(this.fetchPrice,5000);
},

methods:{

/* 🔥 价格修复核心 */
formatPrice(price){
if(!price) return '0.00';

if(window.innerWidth<=768){
return price.toLocaleString(undefined,{maximumFractionDigits:2});
}

return price.toLocaleString(undefined,{maximumFractionDigits:4});
},

async fetchPrice(){

const apis=[
'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT',
'https://api.mexc.com/api/v3/ticker/price?symbol=BTCUSDT',
'https://data-api.binance.vision/api/v3/ticker/price?symbol=BTCUSDT'
];

for(let url of apis){
try{
let res=await axios.get(url,{timeout:3000});

if(res.data && res.data.price){
let p=parseFloat(res.data.price);

this.currentPrice=p;

if(this.baselinePrice===0){
this.baselinePrice=p;
}

return;
}
}catch(e){}
}

}

}
});
</script>

</body>
</html>
