<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto AI - 修复版</title>

<script src="https://cdn.staticfile.net/vue/2.6.14/vue.min.js"></script>
<script src="https://cdn.staticfile.net/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
.price-up{color:#2ecc71}
.price-down{color:#e74c3c}
</style>
</head>

<body>
<div id="app" v-cloak>

<h2>BTC 实时价格</h2>
<div class="card">
    <div :class="priceColor" style="font-size:30px">
        {{ displayPrice }}
    </div>
    <div>波动：{{ priceChangePercent }}%</div>
</div>

<h2>恐惧贪婪指数</h2>
<div class="card">
    <div id="gaugeChart" style="height:200px"></div>
    <div>{{ fearGreedClassification }}</div>
</div>

<h2>新闻</h2>
<div class="card">
    <div v-for="n in newsList">{{ n.title }}</div>
</div>

</div>

<script>
new Vue({
el:"#app",
data:{
    currentPrice:0,
    baselinePrice:0,
    fearGreedIndex:50,
    fearGreedClassification:"加载中...",
    newsList:[],
    chart:null
},

computed:{
displayPrice(){
    return this.currentPrice? "$"+this.currentPrice.toFixed(2):"加载中..."
},
priceChangePercent(){
    if(!this.baselinePrice||!this.currentPrice) return "0.00"
    return ((this.currentPrice-this.baselinePrice)/this.baselinePrice*100).toFixed(2)
},
priceColor(){
    if(!this.baselinePrice) return ""
    return this.currentPrice>this.baselinePrice?"price-up":"price-down"
}
},

mounted(){
    this.$nextTick(()=>{
        this.initChart()
    })
    this.fetchPrice()
    this.fetchNews()
    this.fetchFG()

    setInterval(this.fetchPrice,3000)
    setInterval(this.fetchNews,30000)
},

methods:{

initChart(){
    let dom=document.getElementById("gaugeChart")
    if(!dom) return
    this.chart=echarts.init(dom)
    this.updateChart(50)
},

updateChart(val){
    if(!this.chart) return
    this.chart.setOption({
        series:[{
            type:"gauge",
            min:0,
            max:100,
            data:[{value:val}]
        }]
    })
},

async fetchPrice(){
    try{
        let res=await axios.get("https://data-api.binance.vision/api/v3/ticker/price?symbol=BTCUSDT")
        let p=parseFloat(res.data.price)
        if(!this.baselinePrice) this.baselinePrice=p
        this.currentPrice=p
    }catch(e){
        console.log("价格获取失败")
    }
},

async fetchNews(){
    try{
        let res=await axios.get("https://api.rss2json.com/v1/api.json?rss_url=https://www.theblockbeats.info/rss.xml")
        this.newsList=res.data.items.slice(0,5)
    }catch(e){
        this.newsList=[{title:"新闻加载失败"}]
    }
},

async fetchFG(){
    try{
        let res=await axios.get("https://api.alternative.me/fng/")
        let v=parseInt(res.data.data[0].value)
        this.fearGreedIndex=v

        if(v<25) this.fearGreedClassification="极度恐惧"
        else if(v<50) this.fearGreedClassification="恐惧"
        else if(v<75) this.fearGreedClassification="贪婪"
        else this.fearGreedClassification="极度贪婪"

        this.updateChart(v)
    }catch(e){
        console.log("FG失败")
    }
}

}
})
</script>
</body>
</html>
