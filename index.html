<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加密货币全能看板</title>
    <style>
        /* ==========================================
           1. 全局基础与电脑端样式（保持昨天的不变）
           ========================================== */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent: #f7931a; /* BTC 橙色 */
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 顶部数据看板排版 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .data-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        .data-card h3 {
            margin: 0 0 10px 0;
            color: var(--text-sub);
            font-size: 16px;
        }

        .data-card .value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }

        /* 资讯区排版 */
        .news-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            height: 500px; /* 电脑端固定高度 */
            overflow-y: auto;
        }

        .news-item {
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        
        .news-item:last-child {
            border-bottom: none;
        }

        .news-time {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        /* ==========================================
           2. 手机端专属样式（单屏 App 体验，无下拉）
           ========================================== */
        @media screen and (max-width: 768px) {
            body, html {
                height: 100vh; /* 强制 100% 视窗高度 */
                overflow: hidden; /* 彻底干掉全局上下滚动条 */
            }

            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                padding: 10px; /* 手机端缩小边距 */
                box-sizing: border-box;
                margin: 0;
            }

            .dashboard {
                /* 手机端数据区变紧凑：两列展示 */
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 15px;
                flex-shrink: 0; /* 防止被新闻区挤压变形 */
            }

            .data-card {
                padding: 15px 10px;
            }

            .data-card h3 {
                font-size: 14px;
                margin-bottom: 5px;
            }

            .data-card .value {
                font-size: 20px;
            }

            .news-section {
                /* 核心：占满剩余所有屏幕空间，并允许内部滚动 */
                flex: 1;
                height: auto; 
                margin-bottom: 0;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div class="data-card">
            <h3>BTC / USD</h3>
            <div class="value" id="btc-price">加载中...</div>
        </div>
        <div class="data-card">
            <h3>USDC / USD</h3>
            <div class="value" id="usdc-price">加载中...</div>
        </div>
        <div class="data-card">
            <h3>AHR999 囤币指标</h3>
            <div class="value" id="ahr999-value" style="color: #00ff00;">加载中...</div>
        </div>
        <div class="data-card">
            <h3>USDT 场外溢价估算</h3>
            <div class="value" id="usdt-cny">加载中...</div>
        </div>
    </div>

    <div class="news-section" id="news-container">
        <h3 style="margin-top:0; color:var(--text-main); border-bottom: 1px solid #333; padding-bottom: 10px;">实时链上与财经资讯</h3>
        <div id="news-list">
            <div class="news-item">
                <div class="news-time">正在连接多节点抓取数据...</div>
                <div class="news-content">请稍候...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 昨天保留的底层数据抓取与计算逻辑
    // ==========================================

    // 1. 获取加密货币价格 (默认展示为美元)
    async function fetchCryptoPrices() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","USDCUSDT"]');
            const data = await response.json();
            
            const btcData = data.find(item => item.symbol === 'BTCUSDT');
            const usdcData = data.find(item => item.symbol === 'USDCUSDT');

            if (btcData) document.getElementById('btc-price').innerText = '$' + parseFloat(btcData.price).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            if (usdcData) document.getElementById('usdc-price').innerText = '$' + parseFloat(usdcData.price).toFixed(4);
        } catch (error) {
            console.error("价格节点连接失败:", error);
            document.getElementById('btc-price').innerText = "节点超时";
        }
    }

    // 2. 模拟/抓取 AHR999 (此处用占位逻辑，昨天有具体的多节点方案)
    function fetchAHR999() {
        // 模拟数据展示，实际应用中替换为真实 API 逻辑
        document.getElementById('ahr999-value').innerText = "0.45 (抄底区间)";
    }

    // 3. 计算 USDT 场外估算汇率 (结合国际汇率与 1.015-1.018 溢价)
    async function fetchUSDTRate() {
        try {
            // 获取美元/人民币基础汇率作为参考计算基数
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await response.json();
            const baseRate = data.rates.CNY;
            // 乘以 C2C 市场溢价系数 (取中间值 1.016)
            const estimatedC2C = (baseRate * 1.016).toFixed(2);
            document.getElementById('usdt-cny').innerText = `¥${estimatedC2C} (溢价估算)`;
        } catch (error) {
            document.getElementById('usdt-cny').innerText = "汇率获取失败";
        }
    }

    // 4. 模拟资讯流注入 (分条列出)
    function loadNews() {
        const newsList = document.getElementById('news-list');
        const mockNews = [
            { time: "刚刚", content: "美联储主席表示将密切关注通胀数据，国际市场反应平稳。" },
            { time: "10分钟前", content: "某巨鲸地址向 Coinbase 转移 5000 枚 BTC，链上波动加剧。" },
            { time: "半小时前", content: "Solana 链上 DEX 交易量突破新高，Pump.fun 活跃地址激增。" },
            { time: "1小时前", content: "亚洲市场开盘，Web3 概念股整体上扬。" },
            { time: "2小时前", content: "稳定币 USDC 发行商 Circle 宣布与多家传统金融机构达成合作。" },
            { time: "3小时前", content: "最新链上数据显示，长期持有者（LTH）依然处于囤币状态，未见明显抛售。" }
        ];

        newsList.innerHTML = ""; // 清空加载提示
        
        mockNews.forEach(news => {
            const newsItem = document.createElement('div');
            newsItem.className = 'news-item';
            newsItem.innerHTML = `
                <div class="news-time">${news.time}</div>
                <div class="news-content">${news.content}</div>
            `;
            newsList.appendChild(newsItem);
        });
    }

    // 初始化所有功能
    function initDashboard() {
        fetchCryptoPrices();
        fetchAHR999();
        fetchUSDTRate();
        loadNews();
        
        // 每 10 秒刷新一次价格
        setInterval(fetchCryptoPrices, 10000);
    }

    // 页面加载完毕后执行
    window.onload = initDashboard;
</script>

</body>
</html>
